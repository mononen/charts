# Example: Ingress with Probes
#
# This example demonstrates:
# 1. Components with health probes configured
# 2. Internal and external ingress configuration
# 3. Custom annotations per ingress type

global:
  clientCode: myorg
  project: myapp
  env: dev
  namespace: myorg
  domain: example.com
  
  imageDefaults:
    registry: registry.example.com
    pullPolicy: IfNotPresent
    pullSecrets:
      - name: regcred

components:
  # Example 1: Basic internal ingress with probes
  api:
    enabled: true
    containers:
      - name: api
        image:
          repository: myorg/api
        ports:
          - name: http
            containerPort: 8080
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          periodSeconds: 10
    
    service:
      port: 80
      targetPort: http
    
    ingress:
      className: nginx
      subdomain: "api"
      internal:
        enabled: true
      external:
        enabled: true
  
  # Example 2: Custom annotations per ingress type
  frontend:
    enabled: true
    containers:
      - name: frontend
        image:
          repository: myorg/frontend
        ports:
          - name: http
            containerPort: 3000
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /ready
            port: http
        livenessProbe:
          httpGet:
            path: /live
            port: http
    
    service:
      port: 80
      targetPort: http
    
    ingress:
      className: nginx
      subdomain: "app"
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
      internal:
        enabled: true
      external:
        enabled: true
        annotations:
          nginx.ingress.kubernetes.io/whitelist-source-range: "0.0.0.0/0"
  
  # Example 3: Internal only with custom subdomain
  admin:
    enabled: true
    containers:
      - name: admin
        image:
          repository: myorg/admin
        ports:
          - name: http
            containerPort: 8080
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /health
            port: http
    
    service:
      port: 80
      targetPort: http
    
    ingress:
      className: nginx
      subdomain: "admin"
      internal:
        enabled: true
      external:
        enabled: false
  
  # Example 4: Worker without ingress
  worker:
    enabled: true
    containers:
      - name: worker
        image:
          repository: myorg/worker
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
    
    generate:
      service: false
      ingress: false  # No ingress for workers
      pdb: false
